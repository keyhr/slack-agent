services:
  bot:
    build: ./bot
    env_file: .env
    environment:
      SEARXNG_BASE_URL: http://searxng:8080
      DB_PATH: /app/data/bot.db
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./bot:/app          # ソースをマウント（コード変更が即反映）
      - bot_dev_data:/app/data
    depends_on:
      - searxng
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    ports:
      - "18080:8080"        # ブラウザから検索動作を確認できる（http://localhost:18080）
    restart: unless-stopped

volumes:
  bot_dev_data:
